naftiko: 1.0.0-alpha2
info:
  label: Modal Images API — Images
  description: 'Modal Images API — Images. Declarative container image specifications built lazily by Modal and reused
    across Functions and Sandboxes.'
  tags:
  - Modal
  - Images
  - Containers
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    MODAL_TOKEN_ID: MODAL_TOKEN_ID
    MODAL_TOKEN_SECRET: MODAL_TOKEN_SECRET
capability:
  consumes:
  - type: http
    namespace: images-images
    baseUri: https://api.modal.com
    description: Modal Images consumed API.
    resources:
    - name: images
      path: /v1/images
      operations:
      - name: listImages
        method: GET
        description: Modal List Images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: buildImage
        method: POST
        description: Modal Build Image
        outputRawFormat: json
        outputParameters:
        - name: image
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      value: '{{env.MODAL_TOKEN_ID}}:{{env.MODAL_TOKEN_SECRET}}'
      placement: header
  exposes:
  - type: mcp
    namespace: images-images-mcp
    port: 9090
    transport: http
    description: MCP adapter for Modal Images.
    tools:
    - name: modal-build-image
      description: Build a Modal container image from a layered specification.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: images-images.buildImage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: modal-list-images
      description: List Modal container images.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: images-images.listImages
      outputParameters:
      - type: object
        mapping: $.
