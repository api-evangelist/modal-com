naftiko: 1.0.0-alpha2
info:
  label: Modal Secrets API — Secrets
  description: 'Modal Secrets API — Secrets. Encrypted environment-variable references injected into Modal Functions
    and Sandboxes at runtime.'
  tags:
  - Modal
  - Secrets
  - Configuration
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    MODAL_TOKEN_ID: MODAL_TOKEN_ID
    MODAL_TOKEN_SECRET: MODAL_TOKEN_SECRET
capability:
  consumes:
  - type: http
    namespace: secrets-secrets
    baseUri: https://api.modal.com
    description: Modal Secrets consumed API.
    resources:
    - name: secrets
      path: /v1/secrets
      operations:
      - name: listSecrets
        method: GET
        description: Modal List Secrets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createSecret
        method: POST
        description: Modal Create Secret
        outputRawFormat: json
        outputParameters:
        - name: secret
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: secret
      path: /v1/secrets/{secret_name}
      operations:
      - name: deleteSecret
        method: DELETE
        description: Modal Delete Secret
        inputParameters:
        - name: secret_name
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.MODAL_TOKEN_ID}}:{{env.MODAL_TOKEN_SECRET}}'
      placement: header
  exposes:
  - type: mcp
    namespace: secrets-secrets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Modal Secrets.
    tools:
    - name: modal-list-secrets
      description: List Modal secrets in the workspace.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: secrets-secrets.listSecrets
      outputParameters:
      - type: object
        mapping: $.
    - name: modal-create-secret
      description: Create a Modal secret. Secret values are encrypted at rest.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: secrets-secrets.createSecret
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: modal-delete-secret
      description: Delete a Modal secret.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: secrets-secrets.deleteSecret
      with:
        secret_name: tools.secret_name
