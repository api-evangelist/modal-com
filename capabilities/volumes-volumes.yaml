naftiko: 1.0.0-alpha2
info:
  label: Modal Volumes API — Volumes
  description: 'Modal Volumes API — Volumes. Distributed file system for persistent storage attached to Modal Functions
    and Sandboxes. Includes list/get/create/delete plus file operations and commit.'
  tags:
  - Modal
  - Volumes
  - Storage
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    MODAL_TOKEN_ID: MODAL_TOKEN_ID
    MODAL_TOKEN_SECRET: MODAL_TOKEN_SECRET
capability:
  consumes:
  - type: http
    namespace: volumes-volumes
    baseUri: https://api.modal.com
    description: Modal Volumes consumed API.
    resources:
    - name: volumes
      path: /v1/volumes
      operations:
      - name: listVolumes
        method: GET
        description: Modal List Volumes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createVolume
        method: POST
        description: Modal Create Volume
        outputRawFormat: json
        outputParameters:
        - name: volume
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: volume-files
      path: /v1/volumes/{volume_name}/files
      operations:
      - name: listVolumeFiles
        method: GET
        description: Modal List Volume Files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: volume_name
          in: path
          type: string
          required: true
        - name: path
          in: query
          type: string
      - name: removeVolumeFile
        method: DELETE
        description: Modal Remove Volume File
        inputParameters:
        - name: volume_name
          in: path
          type: string
          required: true
        - name: path
          in: query
          type: string
          required: true
    - name: volume-commits
      path: /v1/volumes/{volume_name}/commits
      operations:
      - name: commitVolume
        method: POST
        description: Modal Commit Volume Changes
        inputParameters:
        - name: volume_name
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.MODAL_TOKEN_ID}}:{{env.MODAL_TOKEN_SECRET}}'
      placement: header
  exposes:
  - type: mcp
    namespace: volumes-volumes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Modal Volumes.
    tools:
    - name: modal-list-volumes
      description: List Modal Volumes in the workspace.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: volumes-volumes.listVolumes
      outputParameters:
      - type: object
        mapping: $.
    - name: modal-create-volume
      description: Create a new Modal Volume.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: volumes-volumes.createVolume
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: modal-commit-volume
      description: Commit pending writes to a Modal Volume.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: volumes-volumes.commitVolume
      with:
        volume_name: tools.volume_name
