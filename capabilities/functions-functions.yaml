naftiko: 1.0.0-alpha2
info:
  label: Modal Functions API — Functions
  description: 'Modal Functions API — Functions. Operations cover listing apps, listing/getting functions, invoking
    synchronously, spawning async calls, and fetching FunctionCall results. Self-contained Naftiko capability covering
    one Modal business surface.'
  tags:
  - Modal
  - Functions
  - Serverless
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    MODAL_TOKEN_ID: MODAL_TOKEN_ID
    MODAL_TOKEN_SECRET: MODAL_TOKEN_SECRET
capability:
  consumes:
  - type: http
    namespace: functions-functions
    baseUri: https://api.modal.com
    description: Modal Functions consumed API. Token-based bearer auth via Modal token id/secret pair.
    resources:
    - name: apps
      path: /v1/apps
      operations:
      - name: listApps
        method: GET
        description: Modal List Apps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createApp
        method: POST
        description: Modal Create App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: function
      path: /v1/functions/{function_id}
      operations:
      - name: getFunction
        method: GET
        description: Modal Get Function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: function_id
          in: path
          type: string
          required: true
    - name: invocations
      path: /v1/functions/{function_id}/invocations
      operations:
      - name: invokeFunction
        method: POST
        description: Modal Invoke Function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: function_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    - name: spawn
      path: /v1/functions/{function_id}/spawn
      operations:
      - name: spawnFunction
        method: POST
        description: Modal Spawn Asynchronous Invocation
        outputRawFormat: json
        outputParameters:
        - name: call
          type: object
          value: $.
        inputParameters:
        - name: function_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    - name: function-call
      path: /v1/function-calls/{call_id}
      operations:
      - name: getFunctionCall
        method: GET
        description: Modal Get Function Call
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: call_id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.MODAL_TOKEN_ID}}:{{env.MODAL_TOKEN_SECRET}}'
      placement: header
  exposes:
  - type: rest
    namespace: functions-functions-rest
    port: 8080
    description: REST adapter for Modal Functions.
    resources:
    - path: /v1/apps
      name: apps
      description: REST surface for apps.
      operations:
      - method: GET
        name: listApps
        description: Modal List Apps
        call: functions-functions.listApps
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/functions/{function_id}/invocations
      name: invocations
      description: REST surface for invocations.
      operations:
      - method: POST
        name: invokeFunction
        description: Modal Invoke Function
        call: functions-functions.invokeFunction
        with:
          function_id: rest.path.function_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: functions-functions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Modal Functions. One tool per consumed operation.
    tools:
    - name: modal-list-apps
      description: List Modal apps in the current workspace.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: functions-functions.listApps
      outputParameters:
      - type: object
        mapping: $.
    - name: modal-invoke-function
      description: Invoke a deployed Modal Function synchronously.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: functions-functions.invokeFunction
      with:
        function_id: tools.function_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: modal-spawn-function
      description: Spawn a Modal Function asynchronously and return a FunctionCall handle.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: functions-functions.spawnFunction
      with:
        function_id: tools.function_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: modal-get-function-call
      description: Fetch the status and result of an async Modal FunctionCall.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: functions-functions.getFunctionCall
      with:
        call_id: tools.call_id
      outputParameters:
      - type: object
        mapping: $.
