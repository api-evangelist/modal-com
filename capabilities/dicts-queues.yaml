naftiko: 1.0.0-alpha2
info:
  label: Modal Dicts and Queues API
  description: 'Modal Dicts and Queues. Distributed in-memory key-value and FIFO primitives used to coordinate work
    across Modal containers.'
  tags:
  - Modal
  - Dicts
  - Queues
  - State
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    MODAL_TOKEN_ID: MODAL_TOKEN_ID
    MODAL_TOKEN_SECRET: MODAL_TOKEN_SECRET
capability:
  consumes:
  - type: http
    namespace: dicts-queues
    baseUri: https://api.modal.com
    description: Modal Dicts and Queues consumed API.
    resources:
    - name: dict-entry
      path: /v1/dicts/{dict_name}/entries/{key}
      operations:
      - name: getDictEntry
        method: GET
        description: Modal Get Dict Entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dict_name
          in: path
          type: string
          required: true
        - name: key
          in: path
          type: string
          required: true
      - name: putDictEntry
        method: PUT
        description: Modal Put Dict Entry
        inputParameters:
        - name: dict_name
          in: path
          type: string
          required: true
        - name: key
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    - name: queue-messages
      path: /v1/queues/{queue_name}/messages
      operations:
      - name: putQueueMessage
        method: POST
        description: Modal Put Queue Message
        inputParameters:
        - name: queue_name
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: getQueueMessage
        method: DELETE
        description: Modal Get Queue Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queue_name
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.MODAL_TOKEN_ID}}:{{env.MODAL_TOKEN_SECRET}}'
      placement: header
  exposes:
  - type: mcp
    namespace: dicts-queues-mcp
    port: 9090
    transport: http
    description: MCP adapter for Modal Dicts and Queues.
    tools:
    - name: modal-put-dict-entry
      description: Store a value in a Modal Dict.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: dicts-queues.putDictEntry
      with:
        dict_name: tools.dict_name
        key: tools.key
        body: tools.body
    - name: modal-get-dict-entry
      description: Get a value from a Modal Dict.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dicts-queues.getDictEntry
      with:
        dict_name: tools.dict_name
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
    - name: modal-put-queue-message
      description: Enqueue a message on a Modal Queue.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dicts-queues.putQueueMessage
      with:
        queue_name: tools.queue_name
        body: tools.body
    - name: modal-get-queue-message
      description: Dequeue and return the next message from a Modal Queue.
      hints:
        readOnly: false
        destructive: true
        idempotent: false
      call: dicts-queues.getQueueMessage
      with:
        queue_name: tools.queue_name
      outputParameters:
      - type: object
        mapping: $.
