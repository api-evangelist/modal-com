naftiko: 1.0.0-alpha2
info:
  label: Modal Sandboxes API — Sandboxes
  description: 'Modal Sandboxes API — Sandboxes. Spawns, manages, and tears down isolated containerized environments
    used by coding agents and untrusted-code rollouts. Self-contained Naftiko capability covering one Modal business
    surface.'
  tags:
  - Modal
  - Sandboxes
  - Agents
  - Code Execution
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    MODAL_TOKEN_ID: MODAL_TOKEN_ID
    MODAL_TOKEN_SECRET: MODAL_TOKEN_SECRET
capability:
  consumes:
  - type: http
    namespace: sandboxes-sandboxes
    baseUri: https://api.modal.com
    description: Modal Sandboxes consumed API.
    resources:
    - name: sandboxes
      path: /v1/sandboxes
      operations:
      - name: listSandboxes
        method: GET
        description: Modal List Sandboxes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createSandbox
        method: POST
        description: Modal Create Sandbox
        outputRawFormat: json
        outputParameters:
        - name: sandbox
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: sandbox
      path: /v1/sandboxes/{sandbox_id}
      operations:
      - name: getSandbox
        method: GET
        description: Modal Get Sandbox
        outputRawFormat: json
        outputParameters:
        - name: sandbox
          type: object
          value: $.
        inputParameters:
        - name: sandbox_id
          in: path
          type: string
          required: true
      - name: terminateSandbox
        method: DELETE
        description: Modal Terminate Sandbox
        inputParameters:
        - name: sandbox_id
          in: path
          type: string
          required: true
    - name: exec
      path: /v1/sandboxes/{sandbox_id}/exec
      operations:
      - name: execSandbox
        method: POST
        description: Modal Execute Sandbox Command
        outputRawFormat: json
        outputParameters:
        - name: process
          type: object
          value: $.
        inputParameters:
        - name: sandbox_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      value: '{{env.MODAL_TOKEN_ID}}:{{env.MODAL_TOKEN_SECRET}}'
      placement: header
  exposes:
  - type: mcp
    namespace: sandboxes-sandboxes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Modal Sandboxes. Designed for use by LLM-driven coding agents.
    tools:
    - name: modal-create-sandbox
      description: Create a Modal Sandbox for isolated code execution.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sandboxes-sandboxes.createSandbox
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: modal-exec-sandbox
      description: Execute a command inside a Modal Sandbox and stream output.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sandboxes-sandboxes.execSandbox
      with:
        sandbox_id: tools.sandbox_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: modal-terminate-sandbox
      description: Terminate a Modal Sandbox.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: sandboxes-sandboxes.terminateSandbox
      with:
        sandbox_id: tools.sandbox_id
